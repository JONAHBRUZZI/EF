name: CI/CD Tienda Perritos - DB

on:
  push:
    branches: ["main"]
    paths:
      - "db/**"
  workflow_dispatch:

env:
  ECR_REPOSITORY: ${{ vars.ENVIRONMENT }}-${{ vars.PROJECT_NAME }}-db-repo

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag y push a ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd db
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }} .
          docker tag $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }} $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest

      - name: Desplegar DB via SSM
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_URI: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_DB_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Actualizar tienda-db desde ECR" \
            --parameters '{"commands":[
              "set -e",
              "docker network inspect tienda-net >/dev/null 2>&1 || docker network create tienda-net",
              "aws ecr get-login-password --region ${{ vars.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}",
              "docker pull ${{ env.IMAGE_URI }}",
              "docker stop tienda-db 2>/dev/null || true",
              "docker rm tienda-db 2>/dev/null || true",
              "docker run -d --name tienda-db --network tienda-net -p 3306:3306 -v dbdata:/var/lib/mysql -e MYSQL_ROOT_PASSWORD=admin123 -e MYSQL_DATABASE=tienda_perritos -e MYSQL_USER=alumno -e MYSQL_PASSWORD=alumno123 ${{ env.IMAGE_URI }}"
            ]}' \
            --output text

      - name: Verificar health DB
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_URI: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          echo "Esperando 20s para que MySQL inicie..."
          sleep 20
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_DB_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["docker exec tienda-db mysqladmin ping -h localhost -u root -padmin123 2>&1 || echo UNHEALTHY"]}' \
            --query 'Command.CommandId' --output text)
          sleep 5
          RESULT=$(aws ssm get-command-invocation \
            --instance-id ${{ secrets.EC2_DB_INSTANCE_ID }} \
            --command-id "$COMMAND_ID" \
            --query 'StandardOutputContent' --output text)
          echo "$RESULT"
          if echo "$RESULT" | grep -q "UNHEALTHY"; then
            echo "DB no esta saludable, revierte al tag latest"
            exit 1
          fi
          echo "DB saludable"
