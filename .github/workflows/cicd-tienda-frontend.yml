name: CI/CD Tienda Perritos - Frontend

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
  workflow_dispatch:

env:
  ECR_REPOSITORY: ${{ vars.ENVIRONMENT }}-${{ vars.PROJECT_NAME }}-frontend-repo
  CLUSTER_NAME: ${{ vars.ENVIRONMENT }}-${{ vars.PROJECT_NAME }}-eks

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Build imagen local
        run: docker build -t frontend:ci ./frontend

      - name: Test - smoke test del contenedor
        run: |
          docker run -d --rm --name frontend-ci -p 8080:80 frontend:ci
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8080/ > /dev/null; then
              echo "Frontend respondio correctamente."
              break
            fi
            echo "Esperando frontend (intento $i)..."
            sleep 2
          done
          curl -sf http://localhost:8080/ > /dev/null
          docker stop frontend-ci

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag y push a ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag frontend:ci $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker tag frontend:ci $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest

      - name: Configurar kubectl
        run: aws eks update-kubeconfig --region ${{ vars.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}

      - name: Actualizar imagen en deployment
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          kubectl set image deployment/frontend \
            frontend=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }} \
            -n tienda

      - name: Verificar rollout
        run: kubectl rollout status deployment/frontend -n tienda --timeout=120s
