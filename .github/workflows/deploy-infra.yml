name: "EKS - Deploy Infrastructure"

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - "tf-aws-eks-main/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

env:
  TF_VAR_environment: ${{ vars.ENVIRONMENT }}
  TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
  TF_VAR_owner_name: ${{ vars.OWNER_NAME }}
  TF_VAR_aws_region: ${{ vars.AWS_REGION }}
  TF_VAR_vpc_cidr: ${{ vars.VPC_CIDR }}
  TF_VAR_kubernetes_version: ${{ vars.KUBERNETES_VERSION }}
  TF_VAR_node_or_fargate: ${{ vars.NODE_OR_FARGATE }}
  TF_VAR_apps_repository: ${{ vars.APPS_REPOSITORY }}
  TF_VAR_node_group_instance_types: ${{ vars.NODE_GROUP_INSTANCE_TYPES }}
  TF_VAR_node_group_capacity_type: ${{ vars.NODE_GROUP_CAPACITY_TYPE }}
  TF_VAR_aws_profile: ""

jobs:
  terraform:
    name: "Terraform Deploy"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tf-aws-eks-main
    outputs:
      cluster_name: ${{ steps.outputs.outputs.cluster_name }}
      cluster_endpoint: ${{ steps.outputs.outputs.cluster_endpoint }}
      kubectl_command: ${{ steps.outputs.outputs.kubectl_command }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9.0"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.BUCKET_BACKEND }}" \
            -backend-config="key=${{ vars.KEY_BACKEND }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -no-color

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve tfplan

      - name: Get deployment outputs
        id: outputs
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)" >> $GITHUB_OUTPUT
          echo "cluster_endpoint=$(terraform output -raw cluster_endpoint)" >> $GITHUB_OUTPUT
          echo "kubectl_command=$(terraform output -raw configure_kubectl_command)" >> $GITHUB_OUTPUT
          terraform output -json ecr_repository_urls > ecr_urls.json

      - name: Upload ECR URLs artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecr-repository-urls
          path: ./tf-aws-eks-main/ecr_urls.json

  deploy-k8s:
    name: "Deploy K8s Manifests"
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download ECR URLs
        uses: actions/download-artifact@v4
        with:
          name: ecr-repository-urls
          path: /tmp/ecr-artifact

      - name: Locate ECR URLs file
        run: find /tmp/ecr-artifact -name ecr_urls.json -exec cp {} ecr_urls.json \;

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Configure kubectl
        run: ${{ needs.terraform.outputs.kubectl_command }}

      - name: Verify cluster connectivity
        run: kubectl get nodes

      - name: Substitute ECR URLs in manifests
        run: |
          ECR_FRONTEND=$(jq -r '.frontend' ecr_urls.json)
          ECR_BACKEND=$(jq -r '.backend' ecr_urls.json)
          ECR_DB=$(jq -r '.db' ecr_urls.json)
          ECR_REGISTRY=$(echo "$ECR_FRONTEND" | cut -d'/' -f1)
          FRONTEND_REPO=$(echo "$ECR_FRONTEND" | cut -d'/' -f2)
          BACKEND_REPO=$(echo "$ECR_BACKEND" | cut -d'/' -f2)
          DB_REPO=$(echo "$ECR_DB" | cut -d'/' -f2)

          echo "ECR_REGISTRY=$ECR_REGISTRY"
          echo "ECR_FRONTEND_REPO=$FRONTEND_REPO"
          echo "ECR_BACKEND_REPO=$BACKEND_REPO"
          echo "ECR_DB_REPO=$DB_REPO"

          echo "=== Archivos en k8s/ ==="
          ls -la k8s/

          find k8s -name '*.yaml' -exec sed -i "s|__ECR_REGISTRY__|$ECR_REGISTRY|g" {} \;
          find k8s -name '*.yaml' -exec sed -i "s|__ECR_FRONTEND_REPO__|$FRONTEND_REPO|g" {} \;
          find k8s -name '*.yaml' -exec sed -i "s|__ECR_BACKEND_REPO__|$BACKEND_REPO|g" {} \;
          find k8s -name '*.yaml' -exec sed -i "s|__ECR_DB_REPO__|$DB_REPO|g" {} \;

      - name: Apply K8s manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secrets.yaml
          kubectl apply -f k8s/db.yaml
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Show resources (imagenes las pushean los pipelines de app)
        run: kubectl -n tienda get all
