apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: tienda
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: __ECR_REGISTRY__/__ECR_FRONTEND_REPO__:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: tienda
  annotations:
    # SG creado por Terraform (aws_security_group.frontend_lb): solo expone el
    # puerto 80 hacia internet y solo reenvia al NodePort fijo de abajo.
    service.beta.kubernetes.io/aws-load-balancer-security-groups: "__FRONTEND_LB_SG__"
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: __FRONTEND_NODE_PORT__
  type: LoadBalancer
