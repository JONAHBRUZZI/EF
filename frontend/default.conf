server {
    listen 80;
    server_name _;
    charset utf-8;

    root /usr/share/nginx/html;
    index index.html;

    # Archivos estáticos (tu SPA sencilla)
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Usamos una variable + resolver dinamico (en vez de un upstream fijo) para que
        # nginx no falle al arrancar si "backend" aun no es resoluble (p.ej. el contenedor
        # corre aislado en un smoke test de CI, o el pod arranca antes que el Service backend).
        #
        # IMPORTANTE: a diferencia de getaddrinfo() (el que usan curl/nslookup), la
        # directiva "resolver" de nginx NO aplica el "search" de /etc/resolv.conf: hay
        # que darle el nombre exacto que CoreDNS conoce. BACKEND_HOST_PLACEHOLDER se
        # sustituye en el arranque (ver 45-backend-host.sh) con la variable de entorno
        # BACKEND_HOST: "backend" en Docker Compose, "backend.tienda.svc.cluster.local"
        # en Kubernetes (definido en k8s/frontend.yaml).
        resolver RESOLVER_PLACEHOLDER valid=10s;
        set $backend_upstream http://BACKEND_HOST_PLACEHOLDER:3001;
        proxy_pass $backend_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
